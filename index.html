<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ＰＲＥＤＩＣＴＯＲ</title>
    <style>
        :root {
            --primary: #E7180B;
            --bg-body: #1a1a1a;
            --app-bg: #ffffff;
            --whatsapp: #25D366;
            --telegram: #0088cc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-body);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* PANTALLA DE CARGA - SPINNER AZUL */
        #loader-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .loader-img {
            width: 100px;
            height: 100px;
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .loader-text {
            color: white;
            margin-top: 20px;
            font-weight: 740;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 13px;
        }

        .main-container {
            width: 100%;
            max-width: 470px;
            height: 100vh;
            background: var(--app-bg);
            position: relative;
            overflow: hidden;
            display: none; 
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .app-header {
            background: var(--primary);
            padding: 10px 10px;
            font-size: 10px;
            font-weight: 740;
            text-align: center;
            color: white;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .history-bar {
            background: #000;
            padding: 8px;
            display: flex;
            gap: 5px;
            overflow-x: auto;
            min-height: 40px;
            border-bottom: 1px solid #000;
            align-items: center;
        }
        .history-bar::-webkit-scrollbar { display: none; }

        .payout-tag {
            font-size: 11px;
            font-weight: 740;
            padding: 3px 8px;
            border-radius: 6px;
            background: white;
            border: 2px solid #000;
            color: var(--primary);
            white-space: nowrap;
            animation: slideIn 1.0s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .content {
            flex: 1;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            overflow-y: auto;
        }

        .logo-box img {
            width: 135px;
            height: auto;
        }

        .status-msg {
            font-size: 11px;
            color: var(--primary);
            font-weight: 740;
            text-transform: uppercase;
            margin: 5px 0;
            text-align: center;
        }

        .prediction-area {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        #alert-icon {
            position: absolute;
            width: 50px;
            top: -15px;
            display: none;
            z-index: 50;
            filter: drop-shadow(0 0 15px rgba(231, 24, 11, 0.9));
            animation: warningPulse 0.5s infinite alternate;
        }
        @keyframes warningPulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .progress-ring { transform: rotate(-90deg); width: 160px; height: 160px; }
        .progress-ring__bg { stroke: #f0f0f0; stroke-width: 10; fill: transparent; r: 70; cx: 80; cy: 80; }
        #prog-bar {
            stroke: var(--primary);
            stroke-width: 10;
            stroke-linecap: round;
            fill: transparent;
            r: 70; cx: 80; cy: 80;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.1s linear;
        }

        #result-display {
            position: absolute;
            font-size: 34px;
            font-weight: 740;
            color: var(--primary);
        }

        .casino-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            margin: 8px 0;
        }

        .casino-btn {
            aspect-ratio: 1 / 1;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #DAB2FF;
            transition: 0.5s;
            overflow: hidden;
            padding: 4px;
        }
        .casino-btn img { width: 100%; height: 100%; object-fit: contain; }
        .casino-btn.selected {
            border-color: #000;
            background: #b184f5;
            transform: scale(1.05);
            border-width: 3px;
        }

        .next-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 0;
            width: 100%;
            font-size: 16px;
            font-weight: 740;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b30000;
            transition: 0.1s;
            text-transform: uppercase;
        }
        .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b30000; }
        .next-btn:disabled { background: #555; box-shadow: none; color: #ccc; cursor: not-allowed; }

        .security-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px 0;
            font-size: 12px;
            font-weight: 740;
            color: var(--primary);
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        /* LOGIN SCREEN & SOCIAL BUTTONS */
        #login-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(160deg,#000,#1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 350px;
            background: white;
            padding: 30px 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            font-size: 16px;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 740;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 740;
            transition: 0.3s;
        }
        .btn-ws { background-color: var(--whatsapp); }
        .btn-tg { background-color: var(--telegram); }
        .social-btn img { width: 20px; height: 20px; }
        .social-btn:active { transform: scale(0.95); }

    </style>
</head>

<script>
    const USER_CORRECTO = "AVIATORPKA";
    const PASS_CORRECTA = "Dari1991@@";
    const misSeñales = [1.66, 3.62, 3.71, 1.72, 4.01, 6.78, 1.50, 2.86];
    let step = 0;

    function login(){
        const user = document.getElementById("user").value;
        const pass = document.getElementById("pass").value;
        const msg = document.getElementById("login-msg");
        const loginScreen = document.getElementById("login-screen");
        const loader = document.getElementById("loader-screen");
        const app = document.getElementById("app");

        if(user === USER_CORRECTO && pass === PASS_CORRECTA){
            loginScreen.style.display = "none";
            loader.style.display = "flex";
            
            setTimeout(() => {
                loader.style.display = "none";
                app.style.display = "flex";
            }, 3000);
        } else {
            msg.innerText = "Usuario o contraseña incorrectos";
            document.getElementById("pass").value = "";
        }
    }

    function selCas(el) {
        document.querySelectorAll('.casino-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn').disabled = false;
        document.getElementById('status').innerText = "VINCULACIÓN EXITOSA";
    }

    function runSequence() {
        const display = document.getElementById('result-display');
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const progBar = document.getElementById('prog-bar');
        
        btn.disabled = true;
        document.getElementById('alert-icon').style.display = "none";
        progBar.style.strokeDashoffset = 440;
        
        let count = 3;
        status.innerText = "INICIANDO PREDICTOR...";
        display.innerText = count;

        let timer = setInterval(() => {
            count--;
            if (count >= 1) {
                display.innerText = count;
            } else {
                clearInterval(timer);
                startAnalysis();
            }
        }, 1000);
    }

    function startAnalysis() {
        const display = document.getElementById('result-display');
        const status = document.getElementById('status');
        const alertImg = document.getElementById('alert-icon');
        const history = document.getElementById('historyBar');
        const btn = document.getElementById('btn');
        const progBar = document.getElementById('prog-bar');
        const winAudio = document.getElementById('win-sound');

        const target = misSeñales[step];
        step = (step + 1) % misSeñales.length;

        let val = 1.00;
        status.innerText = "PREDICCIÓN EN TIEMPO REAL!";

        let loop = setInterval(() => {
            val += 0.08;
            display.innerText = val.toFixed(2) + "x";

            let p = (val - 1) / (target - 1);
            if(p > 1) p = 1;
            progBar.style.strokeDashoffset = 440 - (p * 440); 

            if (val >= target) {
                clearInterval(loop);
                display.innerText = target.toFixed(2) + "x";

                if (winAudio) {
                    winAudio.volume = 0.5;
                    winAudio.currentTime = 0;
                    winAudio.play().catch(() => {});
                }

                alertImg.style.display = "block";
                status.innerText = "¡PREDICCIÓN COMPLETADA!";
                btn.disabled = false;

                const log = document.createElement('div');
                log.className = 'payout-tag';
                log.innerText = target.toFixed(2) + "x";
                history.prepend(log);
            }
        }, 30); 
    }
</script>
